name: Build

on:
  push:
    branches: [main, dev, features]
  pull_request:
    branches: [main, dev, features]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet build PandaDaw.sln
      - run: dotnet publish PandaBack/PandaBack.csproj -c Release -o ./publish
  
  docs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0' }
      - name: Generar HTML Bonito
        run: |
          dotnet tool install -g docfx
          cat << 'EOF' > docfx.json
          {
            "metadata": [{
              "src": [
                { "files": ["PandaBack/PandaBack.csproj", "PandaDawRazor/PandaDawRazor.csproj"] }
              ],
              "dest": "api"
            }],
            "build": {
              "content": [{ "files": ["api/**"] }],
              "dest": "_site",
              "template": ["default", "modern"]
            }
          }
          EOF
          docfx metadata
          docfx build
      - uses: actions/upload-artifact@v4
        with:
          name: Web-Docs
          path: _site

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet test Tests/Tests.csproj --verbosity normal

  bruno:
    name: Bruno
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: docker compose up -d
      - run: dotnet run --project PandaBack/PandaBack.csproj --launch-profile "http" &
      - run: sleep 10
      - name: Run Bruno Tests
        run: cd PandaDaw-BrunoTest && npx @usebruno/cli run --env local

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    needs: bruno
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: docker compose up -d
      - run: dotnet run --project PandaBack/PandaBack.csproj --launch-profile "http" &
      - run: dotnet run --project PandaDawRazor/PandaDawRazor.csproj &
      - run: sleep 15
      - run: dotnet build PandaDaw-Playwright/PandaDaw-Playwright.csproj
      - run: pwsh PandaDaw-Playwright/bin/Debug/net10.0/playwright.ps1 install --with-deps
      - run: dotnet test PandaDaw-Playwright/PandaDaw-Playwright.csproj --verbosity normal

  summary:
    name: Summary
    needs: [build, docs, test, bruno, playwright]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## 🐼 PandaDaw CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Docs | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Bruno API Tests | ${{ needs.bruno.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Playwright E2E | ${{ needs.playwright.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAILED=false
          for result in "${{ needs.build.result }}" "${{ needs.test.result }}" "${{ needs.bruno.result }}" "${{ needs.playwright.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              FAILED=true
            fi
          done
          if [[ "$FAILED" == "false" ]]; then
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed.**" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    name: Deploy to Render
    needs: [summary, build, test, bruno, playwright]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/dev' &&
      needs.build.result == 'success' &&
      needs.test.result == 'success' &&
      needs.bruno.result == 'success' &&
      needs.playwright.result == 'success'
    steps:
      - name: Deploy PandaBack (API)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" | grep -q "2.." \
            && echo "✅ PandaBack deploy triggered" \
            || (echo "❌ Failed to trigger PandaBack deploy" && exit 1)
      - name: Deploy PandaDawRazor (Frontend)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" | grep -q "2.." \
            && echo "✅ PandaDawRazor deploy triggered" \
            || (echo "❌ Failed to trigger PandaDawRazor deploy" && exit 1)
      - name: Deploy summary
        run: |
          echo "## 🚀 Deploy to Render" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 PandaBack (API) | ✅ Triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 PandaDawRazor (Frontend) | ✅ Triggered |" >> $GITHUB_STEP_SUMMARY