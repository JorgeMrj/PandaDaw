name: Build

on:
  push:
    branches: [main, dev, features]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0' }
      - run: dotnet build PandaDaw.sln
      - run: dotnet publish PandaBack/PandaBack.csproj -c Release -o ./publish

  docs:
    name: Documentacion
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0' }
      - name: Generar Web y Publicar
        run: |
          dotnet tool install -g docfx
          
          echo '# Documentacion de PandaDaw' > index.md
          echo 'Bienvenido a la documentacion oficial del codigo fuente de nuestra app de ahorro.' >> index.md
          
          echo '- name: Inicio' > toc.yml
          echo '  href: index.md' >> toc.yml
          echo '- name: Codigo Fuente' >> toc.yml
          echo '  href: api/' >> toc.yml
          
          cat << 'EOF' > docfx.json
          {
            "metadata": [{
              "src": [
                { "files": ["PandaBack/PandaBack.csproj", "PandaDawRazor/PandaDawRazor.csproj"] }
              ],
              "dest": "api"
            }],
            "build": {
              "content": [
                {"files": ["api/**"]},
                {"files": ["index.md", "toc.yml"]} 
              ],
              "dest": "_site",
              "template": ["default", "modern"]
            }
          }
          EOF
          
          docfx metadata
          docfx build
      - uses: actions/upload-pages-artifact@v3
        with: { path: '_site' }
      - uses: actions/deploy-pages@v4

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0' }
      - run: dotnet test Tests/Tests.csproj --verbosity normal

  bruno:
    name: Bruno
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0' }
      - run: docker compose up -d
      - run: dotnet run --project PandaBack/PandaBack.csproj --launch-profile "http" &
      - run: sleep 10
      - run: cd PandaDaw-BrunoTest && npx @usebruno/cli run --env local

  playwright:
    name: Playwright 
    runs-on: ubuntu-latest
    needs: bruno
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0' }
      - run: docker compose up -d
      - run: dotnet run --project PandaBack/PandaBack.csproj --launch-profile "http" &
      - run: dotnet run --project PandaDawRazor/PandaDawRazor.csproj &
      - run: sleep 15
      - run: dotnet build PandaDaw-Playwright/PandaDaw-Playwright.csproj
      - run: pwsh PandaDaw-Playwright/bin/Debug/net10.0/playwright.ps1 install --with-deps
      - run: dotnet test PandaDaw-Playwright/PandaDaw-Playwright.csproj --verbosity normal