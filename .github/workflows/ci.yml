name: Build

on:
  push:
    branches: [main, dev, features]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet build PandaDaw.sln
      - run: dotnet publish PandaBack/PandaBack.csproj -c Release -o ./publish

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet test Tests/Tests.csproj --verbosity normal

  test-bruno:
    name: Test Bruno
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: npx @usebruno/cli run PandaDaw-BrunoTest

  test-playwright:
    name: Test Playwright
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet build PandaDaw-Playwright/PandaDaw-Playwright.csproj
      - run: pwsh PandaDaw-Playwright/bin/Debug/net10.0/playwright.ps1 install --with-deps
      - run: dotnet test PandaDaw-Playwright/PandaDaw-Playwright.csproj --verbosity normal