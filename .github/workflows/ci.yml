name: CI/CD Pipeline

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [master, dev, features]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet build PandaDaw.sln
      - run: dotnet publish PandaBack/PandaBack.csproj -c Release -o ./publish

  docs:
    name: Documentación
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Generar documentación
        run: |
          dotnet tool install -g docfx
          cat << 'EOF' > docfx.json
          {
            "metadata": [{
              "src": [{ "files": ["PandaBack/PandaBack.csproj", "PandaDawRazor/PandaDawRazor.csproj"] }],
              "dest": "api"
            }],
            "build": {
              "content": [{ "files": ["api/**"] }],
              "dest": "_site",
              "template": ["default", "modern"]
            }
          }
          EOF
          docfx metadata
          docfx build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-docs:
    name: Despliegue Documentación a GitHub Pages
    needs: docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-unit:
    name: Tests Unitarios
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet test Tests/Tests.csproj --filter "FullyQualifiedName!~Integration" --verbosity normal

  test-integration:
    name: Tests Integración
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet test Tests/Tests.csproj --filter "FullyQualifiedName~Integration" --verbosity normal

  test-bruno:
    name: Bruno API Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: docker compose up -d
      - run: dotnet run --project PandaBack/PandaBack.csproj --launch-profile "http" &
      - run: sleep 10
      - run: cd PandaDaw-BrunoTest && npx @usebruno/cli run --env local

  test-playwright:
    name: Playwright E2E
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: docker compose up -d
      - run: dotnet run --project PandaBack/PandaBack.csproj --launch-profile "http" &
      - run: dotnet run --project PandaDawRazor/PandaDawRazor.csproj &
      - run: sleep 15
      - run: dotnet build PandaDaw-Playwright/PandaDaw-Playwright.csproj
      - run: pwsh PandaDaw-Playwright/bin/Debug/net10.0/playwright.ps1 install --with-deps
      - run: dotnet test PandaDaw-Playwright/PandaDaw-Playwright.csproj --verbosity normal

  summary:
    name: Resumen
    needs: [build, docs, test-unit, test-integration, test-bruno, test-playwright]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Crear resumen
        run: |
          echo "## 🐼 Resumen del Pipeline CI/CD de PandaDaw" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Trabajo | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Compilación | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Documentación | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests Unitarios | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Tests Integración | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Tests API Bruno | ${{ needs.test-bruno.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Tests E2E Playwright | ${{ needs.test-playwright.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAILED=false
          for result in "${{ needs.build.result }}" "${{ needs.test-unit.result }}" "${{ needs.test-integration.result }}" "${{ needs.test-bruno.result }}" "${{ needs.test-playwright.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              FAILED=true
            fi
          done
          if [[ "$FAILED" == "false" ]]; then
            echo "✅ **¡Todas las comprobaciones pasaron!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Algunas comprobaciones fallaron.**" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    name: Deploy a Render
    needs: [summary, build, test-unit, test-integration, test-bruno, test-playwright]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.build.result == 'success' &&
      needs.test-unit.result == 'success' &&
      needs.test-integration.result == 'success' &&
      needs.test-bruno.result == 'success' &&
      needs.test-playwright.result == 'success'
    steps:
      - name: Desplegar PandaBack (API)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" | grep -q "2.." \
            && echo "✅ Despliegue de PandaBack lanzado" \
            || (echo "❌ Error al lanzar el despliegue de PandaBack" && exit 1)
      - name: Desplegar PandaDawRazor (Frontend)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" | grep -q "2.." \
            && echo "✅ Despliegue de PandaDawRazor lanzado" \
            || (echo "❌ Error al lanzar el despliegue de PandaDawRazor" && exit 1)
      - name: Resumen del despliegue
        run: |
          echo "## 🚀 Despliegue en Render" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 PandaBack (API) | ✅ Lanzado |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 PandaDawRazor (Frontend) | ✅ Lanzado |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Los servicios tardarán unos minutos en estar disponibles." >> $GITHUB_STEP_SUMMARY